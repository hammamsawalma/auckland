<!DOCTYPE html>
<html dir="rtl">
<head>
<style>
  .overflow-hidden { overflow: hidden; position: relative; width: 100%; height: 200px; border: 2px solid red; background: #eee; }
  .flex { display: flex; gap: 10px; width: max-content; }
  .item { width: 100px; height: 100px; background: blue; color: white; flex-shrink: 0; }
  .slider { animation: slide 5s linear infinite; }
  @keyframes slide {
    0% { transform: translateX(0%); }
    100% { transform: translateX(50%); }
  }
</style>
</head>
<body>
  <div class="overflow-hidden">
    <div class="flex slider">
      <div class="item">1</div><div class="item">2</div><div class="item">3</div><div class="item">4</div>
      <!-- duplicate -->
      <div class="item">1</div><div class="item">2</div><div class="item">3</div><div class="item">4</div>
    </div>
  </div>
</body>
</html>
